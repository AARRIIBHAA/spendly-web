<!--
  Supabase auth email redirect target.

  After a user taps the "Confirm your signup" link in their verification
  email, Supabase verifies the token server-side and then redirects their
  browser here — this page is purely informational and does not talk to
  Supabase or the app itself.

  This file must be hosted somewhere (e.g. static hosting) and that URL
  set manually in the Supabase dashboard under
  Authentication > URL Configuration as the confirmation redirect URL.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email verified — Spendly</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    max-width: 400px;
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    padding: 48px;
    text-align: center;
  }
  .wordmark {
    font-size: 42px;
    font-weight: 700;
    color: #FF6B35;
    letter-spacing: -0.5px;
    margin: 0;
  }
  .tagline {
    font-size: 16px;
    color: #888888;
    margin: 8px 0 32px;
  }
  .check-circle {
    width: 80px;
    height: 80px;
    border-radius: 999px;
    background: #fff0eb;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .check-circle svg {
    width: 36px;
    height: 36px;
  }
  h1 {
    color: #1a1a2e;
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 12px;
  }
  .subtitle {
    color: #888888;
    font-size: 15px;
    line-height: 1.5;
    max-width: 300px;
    margin: 0 auto;
  }
</style>
</head>
<body>
  <div class="card">
    <p class="wordmark">Spendly</p>
    <p class="tagline">No receipts. No stress.</p>

    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12.5L9.5 18L20 6" stroke="#FF6B35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>You're verified!</h1>
    <p class="subtitle">Your Spendly account is ready. Head back to the app to continue setting up.</p>
  </div>
</body>
</html>
